name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build static musl binaries and create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: musl-release

      # Direct pinned download instead of a setup-zig action: every zig-setup
      # action is still stuck on the deprecated Node 20 runtime. Deterministic
      # (version + sha256). cargo-zigbuild 0.23 supports zig 0.15.
      - name: Install zig (cargo-zigbuild backend)
        run: |
          ZIG_VERSION=0.15.2
          ZIG_SHA256=02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239
          curl -fsSL "https://ziglang.org/download/$ZIG_VERSION/zig-x86_64-linux-$ZIG_VERSION.tar.xz" -o zig.tar.xz
          echo "$ZIG_SHA256  zig.tar.xz" | sha256sum -c -
          tar -xf zig.tar.xz
          echo "$PWD/zig-x86_64-linux-$ZIG_VERSION" >> "$GITHUB_PATH"

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build release binary
        run: |
          cargo zigbuild \
            --release \
            --target x86_64-unknown-linux-musl \
            --bin ferrosonic

      - name: Stage versioned artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cp target/x86_64-unknown-linux-musl/release/ferrosonic \
             "ferrosonic-${VERSION}-linux-x86_64"

      - name: Extract release notes for this tag
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No release notes for $VERSION found in CHANGELOG.md"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            "ferrosonic-${GITHUB_REF_NAME#v}-linux-x86_64"
