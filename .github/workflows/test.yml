name: test

# Gates run on every push to master and on PRs; nightly schedule adds the
# slow mutants job. The release workflow still fires on tag push.
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Gating clippy run
        run: cargo clippy --all-targets --all-features

  clippy_audit:
    name: clippy (aspirational, non-gating)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Pedantic + nursery + missing-docs warning count
        run: cargo clippy --all-targets --all-features -- -W clippy::pedantic -W clippy::nursery -W missing_docs

  deny:
    name: cargo-deny (advisories + licenses + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: bnjbvr/cargo-machete@main

  unwrap_check:
    name: forbid unwrap/expect in production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Clippy unwrap_used / expect_used on non-test build
        run: |
          cargo clippy --lib --bins --all-features \
            -- -D clippy::unwrap_used -D clippy::expect_used

  mutants:
    name: cargo-mutants (slow, nightly only)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config mpv
      - name: Run cargo-mutants
        run: cargo mutants --no-shuffle --timeout 60 -- --all-targets
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
          retention-days: 30

  test:
    name: nextest + mpv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install runtime deps (mpv for real-mpv smoke test)
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv libdbus-1-dev pkg-config
      - name: Run tests
        run: cargo nextest run --all-targets
      - name: Doc tests (nextest skips these)
        run: cargo test --doc

  coverage:
    name: coverage (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: sudo apt-get update && sudo apt-get install -y mpv libdbus-1-dev pkg-config
      # nextest backend = process-per-test, matching the gating test job. The
      # plain `cargo test` backend shares one process, so tests that set the
      # process-global FERROSONIC_CONFIG_DIR env race and crash a spawned daemon.
      # The coverage profile also drops real-binary e2e tests (no in-process
      # coverage). best-effort: a test that flakes only under llvm-cov
      # instrumentation must not block the report, which the gating test job
      # already covers; profraw from every test that ran is still written.
      - name: Collect coverage (nextest backend, coverage profile)
        continue-on-error: true
        run: NEXTEST_PROFILE=coverage cargo llvm-cov nextest --all-features --workspace --no-report
      - name: Generate lcov
        run: cargo llvm-cov report --lcov --output-path lcov.info
      - name: Generate HTML report
        run: cargo llvm-cov report --html
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html/
          retention-days: 30
      - name: Print coverage summary
        run: cargo llvm-cov report --summary-only
