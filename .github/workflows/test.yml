name: test

# Manual trigger by default; nightly schedule runs the slow mutants job.
# The release workflow still fires on tag push.
on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - run: cargo clippy --all-targets --all-features -- -D warnings

  unwrap_grep:
    name: forbid unwrap/expect in src
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep src/ for forbidden patterns
        run: |
          set -e
          if grep -RnE '\.unwrap\(\)|\.expect\(' src/ \
              --include='*.rs' \
              --exclude-dir=tests \
              --exclude-dir=examples \
              --exclude-dir=benches; then
            echo
            echo "::error::production code uses .unwrap() or .expect()."
            echo "Move the call to tests/examples/benches, or replace with proper error handling, or add #[cfg(test)] gating."
            exit 1
          fi
          echo "src/ is clean of .unwrap() and .expect() outside tests/examples/benches."

  mutants:
    name: cargo-mutants (slow, nightly only)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config mpv
      - name: Run cargo-mutants
        run: cargo mutants --no-shuffle --timeout 60 -- --all-targets
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-report
          path: mutants.out/
          retention-days: 30

  test:
    name: nextest + mpv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - name: Install runtime deps (mpv for real-mpv smoke test)
        run: |
          sudo apt-get update
          sudo apt-get install -y mpv libdbus-1-dev pkg-config
      - name: Run tests
        run: cargo nextest run --all-targets
      - name: Doc tests (nextest skips these)
        run: cargo test --doc

  coverage:
    name: coverage (report only)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - run: sudo apt-get update && sudo apt-get install -y mpv libdbus-1-dev pkg-config
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Generate HTML report
        run: cargo llvm-cov --all-features --workspace --html
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html/
          retention-days: 30
      - name: Print coverage summary
        run: cargo llvm-cov --all-features --workspace --summary-only
